name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Emits both apps under their GitHub Pages sub-paths
      # (see apps/*/vite.config.ts and apps/player asset URLs).
      GH_PAGES: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages and apps
        run: pnpm build

      - name: Assemble Pages site
        run: |
          rm -rf site
          mkdir -p site
          cp deploy/index.html site/index.html
          cp -r apps/creator/dist site/creator
          cp -r apps/player/dist site/player

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
