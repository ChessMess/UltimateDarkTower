name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm test
      - run: cd packages/electron && npx electron-forge make

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/electron/out/make/**/*.dmg
            packages/electron/out/make/**/*.zip
