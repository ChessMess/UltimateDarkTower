<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ultimate Dark Tower — Ecosystem</title>
    <meta
      name="description"
      content="The Ultimate Dark Tower ecosystem — TypeScript libraries, renderers, and companion apps for Return to Dark Tower. Status, versions, and live demos for every package."
    />
    <link rel="icon" type="image/svg+xml" href="./media/glyphs/battle.svg" />

    <!-- Fonts: Cinzel (engraved display), Archivo (body), IBM Plex Mono (metadata) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cinzel+Decorative:wght@700;900&family=Archivo:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="vignette"></div>
    <div class="grain"></div>

    <header class="hero">
      <div class="hero-bg"></div>
      <p class="eyebrow">Welcome to the</p>

      <div class="emblem" aria-hidden="true">
        <div class="halo"></div>
        <div class="track"></div>
        <img class="tower" src="./media/tower.png" alt="" />
        <div class="ring">
          <span class="glyph g-battle" style="--a: 0deg"></span>
          <span class="glyph g-quest" style="--a: 72deg"></span>
          <span class="glyph g-cleanse" style="--a: 144deg"></span>
          <span class="glyph g-reinforce" style="--a: 216deg"></span>
          <span class="glyph g-banner" style="--a: 288deg"></span>
        </div>
      </div>

      <h1>Ultimate Dark Tower<span class="sub">Ecosystem</span></h1>
      <p class="tagline"><!-- TAGLINE --></p>

      <div class="stats"><!-- STATS --></div>

      <a class="scroll-cue" href="#apps" aria-label="Scroll to the ecosystem">
        Explore <span>▾</span>
      </a>
    </header>

    <main>
      <!-- COMPONENTS -->
    </main>

    <footer>
      <div class="foot-glyphs" aria-hidden="true">
        <span class="glyph g-cleanse"></span>
        <span class="glyph g-banner"></span>
        <span class="glyph g-battle"></span>
        <span class="glyph g-quest"></span>
        <span class="glyph g-reinforce"></span>
      </div>
      <p>
        Built from the <code>UltimateDarkTower</code> monorepo ·
        <a href="https://github.com/ChessMess/UltimateDarkTower">Source on GitHub</a>
      </p>
      <p class="built"><!-- BUILT_AT --></p>
      <p class="built" style="opacity: 0.7">
        A fan project for Restoration Games’ Return to Dark Tower. Not affiliated with Restoration Games.
      </p>
    </footer>
  </body>
</html>
