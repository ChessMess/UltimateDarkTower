name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout UltimateDarkTowerDisplay
        uses: actions/checkout@v6
        with:
          path: UltimateDarkTowerDisplay

      - name: Checkout UltimateDarkTower (sibling dev dependency)
        uses: actions/checkout@v6
        with:
          repository: ChessMess/UltimateDarkTower
          path: UltimateDarkTower

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: UltimateDarkTowerDisplay/package-lock.json
          registry-url: https://registry.npmjs.org

      - run: npm ci
        working-directory: UltimateDarkTowerDisplay
      - run: npm run ci
        working-directory: UltimateDarkTowerDisplay

      - run: npm publish --provenance
        working-directory: UltimateDarkTowerDisplay
