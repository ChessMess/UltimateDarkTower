name: Deploy Example + Lighting Bake-Off to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout UltimateDarkTowerDisplay
        uses: actions/checkout@v6
        with:
          path: UltimateDarkTowerDisplay

      - name: Checkout UltimateDarkTower (sibling dependency)
        uses: actions/checkout@v6
        with:
          repository: ChessMess/UltimateDarkTower
          path: UltimateDarkTower

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: UltimateDarkTowerDisplay/package-lock.json

      - run: npm ci
        working-directory: UltimateDarkTowerDisplay
      - run: npm run build:example
        working-directory: UltimateDarkTowerDisplay

      - name: Assemble combined Pages artifact
        run: |
          mkdir -p _site
          cp -R UltimateDarkTowerDisplay/dist-example/. _site/
          mkdir -p _site/lighting-experiments
          cp -R UltimateDarkTowerDisplay/docs/lighting-experiments/results/. _site/lighting-experiments/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
