<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UltimateDarkTowerDisplay — Example</title>
  <style>
    body {
      margin: 0;
      padding: 2rem;
      background: #161616;
      color: #e8e8e8;
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 960px;
      margin-left: auto;
      margin-right: auto;
    }

    h1 {
      font-size: 1.2rem;
      margin-bottom: 0.5rem;
    }

    p {
      max-width: 46rem;
      color: #b8b8b8;
      line-height: 1.5;
      margin: 0 0 1rem;
    }

    button {
      background: #333;
      color: #e8e8e8;
      border: 1px solid #555;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      margin-right: 0.5rem;
      margin-bottom: 1rem;
    }

    button:hover {
      background: #444;
    }

    .view-btns {
      display: inline-flex;
      gap: 0.25rem;
      margin-left: 1rem;
      vertical-align: middle;
    }

    .view-btns button {
      margin: 0;
      font-size: 0.75rem;
      padding: 0.35rem 0.7rem;
    }

    .view-btns button.active {
      background: #2a4a2a;
      border-color: #4a7a4a;
      color: #b8f0b8;
    }

    #tower {
      max-width: 500px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 520px) minmax(280px, 420px);
      gap: 1.5rem;
      align-items: stretch;
    }

    .panel {
      background: #1f1f1f;
      border: 1px solid #2f2f2f;
      border-radius: 10px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-header h2 {
      margin: 0 0 0.75rem;
    }

    h2 {
      font-size: 0.9rem;
      margin: 0 0 0.75rem;
      color: #d8d8d8;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    pre {
      margin: 0;
      overflow: auto;
      font-size: 0.8rem;
      line-height: 1.45;
      color: #d6f2d6;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 0.9rem;
    }

    #state-preview {
      margin: 0;
      flex: 1;
      min-height: 200px;
      resize: none;
      overflow: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.8rem;
      line-height: 1.45;
      color: #d6f2d6;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 0.9rem;
      white-space: pre;
      tab-size: 2;
    }

    #state-preview:focus {
      outline: 1px solid #4a7a4a;
    }

    #btn-apply {
      font-size: 0.75rem;
      padding: 0.3rem 0.7rem;
      margin: 0 0 0.75rem 0;
    }

    #btn-apply:disabled {
      opacity: 0.35;
      cursor: default;
    }

    #btn-apply:not(:disabled) {
      background: #2a4a2a;
      border-color: #4a7a4a;
      color: #b8f0b8;
    }

    #btn-apply:not(:disabled):hover {
      background: #3a5a3a;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    #error-banner {
      display: block;
      margin: 0 0 1rem;
      padding: 0.6rem 0.8rem;
      border: 1px solid #9f3a38;
      background: #3a1f1e;
      color: #ffd9d9;
      border-radius: 6px;
      font-size: 0.85rem;
      line-height: 1.3;
    }

    #error-banner[hidden] {
      display: none;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <h1>UltimateDarkTowerDisplay Example</h1>
  <p>
    Use the buttons to load preset states or randomize values. Edit the JSON directly in the panel
    on the right and click <strong>Apply</strong> to see your changes rendered on the tower.
  </p>
  <div id="error-banner" hidden></div>
  <div>
    <button id="btn-readme">README Example State</button>
    <button id="btn-random">Randomize</button>
    <button id="btn-idle">Show Idle</button>
    <span class="view-btns">
      <span style="color:#888; font-size:0.75rem; margin-right:0.25rem;">View:</span>
      <button id="btn-view-readout">Readout</button>
      <button id="btn-view-svg">Side View</button>
      <button id="btn-view-both" class="active">Both</button>
    </span>
  </div>
  <div class="layout">
    <div class="panel">
      <h2>Rendered Output</h2>
      <div id="tower"></div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <h2>Applied State</h2>
        <button id="btn-apply" disabled>Apply</button>
      </div>
      <textarea id="state-preview" spellcheck="false" wrap="off"></textarea>
    </div>
  </div>

  <script>
    (() => {
      const banner = document.getElementById('error-banner');

      function showError(message) {
        if (!banner) return;
        banner.hidden = false;
        banner.textContent = `Example runtime error: ${message}`;
      }

      window.__udtdExampleReady = false;

      window.addEventListener('error', (event) => {
        const target = event.target;
        if (target instanceof HTMLScriptElement) {
          showError(`Failed to load script: ${target.src || 'inline module script'}`);
          return;
        }
        showError(event.message || 'Unknown runtime error');
      });

      window.addEventListener('unhandledrejection', (event) => {
        const reason = event.reason;
        showError(reason instanceof Error ? reason.message : String(reason));
      });

      setTimeout(() => {
        if (!window.__udtdExampleReady) {
          showError('Example failed to initialize. Open DevTools console for details.');
        }
      }, 1200);
    })();
  </script>

  <script type="module">
    import { TowerDisplay } from '../src/index.ts';
    import {
      createDefaultTowerState,
      LIGHT_EFFECTS,
      TOWER_AUDIO_LIBRARY,
      TOWER_LIGHT_SEQUENCES,
    } from 'ultimatedarktower';

    const banner = document.getElementById('error-banner');
    const statePreview = document.getElementById('state-preview');
    const btnApply = document.getElementById('btn-apply');
    const towerContainer = document.getElementById('tower');

    if (!(towerContainer instanceof HTMLElement)) {
      throw new Error('Missing #tower container');
    }

    let display = new TowerDisplay({ container: towerContainer });
    let lastState = null;

    const viewButtons = {
      'btn-view-readout': 'readout',
      'btn-view-svg': 'side-view',
      'btn-view-both': ['readout', 'side-view'],
    };

    function setActiveViewButton(activeId) {
      for (const id of Object.keys(viewButtons)) {
        const el = document.getElementById(id);
        if (el) el.classList.toggle('active', id === activeId);
      }
    }

    function recreateDisplay(renderers, activeId) {
      display.dispose();
      display = new TowerDisplay({ container: towerContainer, renderers });
      setActiveViewButton(activeId);
      if (lastState) display.applyState(lastState);
    }

    for (const [id, renderers] of Object.entries(viewButtons)) {
      document.getElementById(id).addEventListener('click', () => recreateDisplay(renderers, id));
    }

    const lightEffects = Object.values(LIGHT_EFFECTS).filter((value) => typeof value === 'number');
    const lightSequences = Object.values(TOWER_LIGHT_SEQUENCES).filter((value) => typeof value === 'number');
    const audioSamples = Object.values(TOWER_AUDIO_LIBRARY).map((entry) => entry.value);

    let cleanJson = '';

    function showState(state) {
      if (!statePreview) return;
      const json = JSON.stringify(state, null, 2);
      statePreview.value = json;
      cleanJson = json;
      if (btnApply) btnApply.disabled = true;
    }

    function applyAndShow(state) {
      lastState = state;
      display.applyState(state);
      showState(state);
    }

    if (statePreview) {
      statePreview.addEventListener('input', () => {
        if (btnApply) btnApply.disabled = statePreview.value === cleanJson;
      });
    }

    if (btnApply) {
      btnApply.addEventListener('click', () => {
        if (!statePreview) return;
        try {
          banner.hidden = true;
          const parsed = JSON.parse(statePreview.value);
          display.applyState(parsed);
          cleanJson = statePreview.value;
          btnApply.disabled = true;
        } catch (err) {
          banner.hidden = false;
          banner.textContent = `Invalid JSON: ${err.message}`;
        }
      });
    }

    function createReadmeExampleState() {
      const state = createDefaultTowerState();

      state.layer[0].light[0].effect = LIGHT_EFFECTS.on;
      state.layer[0].light[1].effect = LIGHT_EFFECTS.breathe;
      state.drum[0].position = 1;
      state.drum[0].calibrated = true;
      state.audio.sample = TOWER_AUDIO_LIBRARY.Ashstrider.value;
      state.audio.loop = true;
      state.beam.count = 2;

      return state;
    }

    function randomize() {
      const state = createDefaultTowerState();

      for (const layer of state.layer) {
        for (const light of layer.light) {
          light.effect = lightEffects[Math.floor(Math.random() * lightEffects.length)];
          light.loop = Math.random() > 0.5;
        }
      }

      for (const drum of state.drum) {
        drum.position = Math.floor(Math.random() * 4);
        drum.calibrated = Math.random() > 0.3;
      }

      state.audio.sample = audioSamples[Math.floor(Math.random() * audioSamples.length)];
      state.audio.loop = Math.random() > 0.5;
      state.audio.volume = Math.floor(Math.random() * 4);

      state.beam.count = Math.floor(Math.random() * 6);
      state.beam.fault = Math.random() > 0.8;

      if (Math.random() > 0.7) {
        state.led_sequence = lightSequences[Math.floor(Math.random() * lightSequences.length)];
      }

      applyAndShow(state);
    }

    document.getElementById('btn-readme').addEventListener('click', () => {
      applyAndShow(createReadmeExampleState());
    });

    document.getElementById('btn-random').addEventListener('click', randomize);
    document.getElementById('btn-idle').addEventListener('click', () => {
      display.showIdle();
      if (statePreview) {
        statePreview.value = 'Idle view: no state currently rendered.';
        cleanJson = statePreview.value;
        if (btnApply) btnApply.disabled = true;
      }
    });

    applyAndShow(createReadmeExampleState());
    window.__udtdExampleReady = true;
  </script>
</body>

</html>
