name: Publish to npm

on:
  release:
    types: [published]

# OIDC trusted publishing — no NPM_TOKEN secret. Mirrors UltimateDarkTowerDisplay.
# One-time setup: register this repo + workflow as a Trusted Publisher for
# `ultimatedarktowerboard` on npmjs.com (package → Settings → Trusted Publisher).
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout UltimateDarkTowerBoard
        uses: actions/checkout@v6
        with:
          path: UltimateDarkTowerBoard

      # Build the siblings from their default branch (main) — no SHA pin. Publishing
      # is intentional and ordered (release UDT, then Display, then Board), so each
      # sibling's main IS the version being published when Board's release is cut.
      - name: Checkout UltimateDarkTower (sibling)
        uses: actions/checkout@v6
        with:
          repository: ChessMess/UltimateDarkTower
          path: UltimateDarkTower

      - name: Checkout UltimateDarkTowerDisplay (sibling)
        uses: actions/checkout@v6
        with:
          repository: ChessMess/UltimateDarkTowerDisplay
          path: UltimateDarkTowerDisplay

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: UltimateDarkTowerBoard/package-lock.json
          registry-url: https://registry.npmjs.org

      # Trusted publishing needs npm >= 11.5.1; Node 20 may bundle an older npm.
      - name: Ensure modern npm
        run: npm i -g npm@latest

      - name: Build siblings
        run: |
          (cd UltimateDarkTower && npm ci && npm run build)
          (cd UltimateDarkTowerDisplay && npm ci && npm run build)

      - name: Install + CI
        run: npm ci && npm run ci
        working-directory: UltimateDarkTowerBoard

      - name: Publish (provenance)
        run: npm publish --provenance
        working-directory: UltimateDarkTowerBoard
