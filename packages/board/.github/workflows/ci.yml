name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20]
    steps:
      - name: Checkout UltimateDarkTowerBoard
        uses: actions/checkout@v6
        with:
          path: UltimateDarkTowerBoard

      # Dev uses file: links to the siblings, so check them out as siblings and
      # build them first (no prepare script -> dist isn't produced on install).
      - name: Checkout UltimateDarkTower (sibling)
        uses: actions/checkout@v6
        with:
          repository: ChessMess/UltimateDarkTower
          ref: e1dc6fb296ada8a7a1a10ec84f2d181f0efb9fa8
          path: UltimateDarkTower

      - name: Checkout UltimateDarkTowerDisplay (sibling)
        uses: actions/checkout@v6
        with:
          repository: ChessMess/UltimateDarkTowerDisplay
          ref: 8b47295f5277e93d875b200941f5cd59e18173e1
          path: UltimateDarkTowerDisplay

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: UltimateDarkTowerBoard/package-lock.json

      - name: Build sibling — ultimatedarktower
        run: npm ci && npm run build
        working-directory: UltimateDarkTower

      - name: Build sibling — ultimatedarktowerdisplay
        run: npm ci && npm run build
        working-directory: UltimateDarkTowerDisplay

      - name: Install + CI
        run: npm ci && npm run ci
        working-directory: UltimateDarkTowerBoard

      - name: Guard — the `.` entry must stay three-free
        working-directory: UltimateDarkTowerBoard
        run: |
          offenders=$(grep -rEl "from ['\"](three|ultimatedarktowerdisplay)" src --include='*.ts' | grep -v '^src/plugin/' || true)
          if [ -n "$offenders" ]; then
            echo "::error::Non-plugin source imports three/Display:"; echo "$offenders"; exit 1
          fi
