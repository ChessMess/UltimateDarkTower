nodeLinker: hoisted

packages:
  - 'packages/*'
  - 'apps/*'

# Single source of truth for the TypeScript version across the whole workspace.
# Packages reference it via "typescript": "catalog:".
# Pinned to 5.9.x (not 6.0): TS 6.0 dropped the automatic inclusion of all
# node_modules/@types, which breaks ambient types (jest globals, web-bluetooth,
# three, node) across every package. 5.9.3 is what the packages were authored on.
catalog:
  typescript: ^5.9.3
  vitest: ^4.1.10
  # Coverage provider for vitest. Its peer range on vitest is exact, so these two
  # must be bumped together — that's the main reason it belongs in the catalog.
  '@vitest/coverage-v8': ^4.1.10

  # Build/test tooling shared across many workspaces.
  vite: ^8.0.0
  jsdom: ^25.0.0
  '@vitejs/plugin-react': ^6.0.0
  '@types/node': ^22.0.0

  # Runtime libraries. three is the load-bearing one: .npmrc force-hoists it so
  # every package shares a single copy (multiple copies break `instanceof`), and
  # a drifting range is what breaks that. Cataloguing makes the invariant
  # structural instead of a convention. Keep @types/* on the same version as the
  # package they type.
  three: ^0.185.0
  '@types/three': ^0.185.0
  gsap: ^3.15.0
  '@dimforge/rapier3d-compat': ^0.19.3
  react: ^19.2.0
  react-dom: ^19.2.0
  '@types/react': ^19.2.0
  '@types/react-dom': ^19.2.0
  ws: ^8.18.0
  '@types/ws': ^8.5.10
  ajv: ^8.17.0
  ajv-formats: ^3.0.0
  zustand: ^5.0.0
  fake-indexeddb: ^6.2.5

  # NOTE: peerDependencies are deliberately NOT catalogued. A peer range should be
  # wider than the version you build against (packages/board and packages/display
  # declare `three: ">=0.185.0"`), and `catalog:` would narrow it to the caret
  # range above.

# Security overrides (Dependabot triage, 2026-07): collapse stale duplicate copies
# onto the already-patched versions that other deps already resolve in-tree.
#  - tar: `tar@6.2.1` is pulled by the electron packaging toolchain
#    (@electron/rebuild, @electron/node-gyp, cacache); every tar advisory <=7.5.15
#    covers all of 6.x, and the fix ships only in 7.5.16+ (a major bump for those
#    deps). Forcing 7.5.19 — which already resolves elsewhere — clears 7 alerts.
#    Verify the electron native-rebuild path still works: `pnpm --filter
#    ultimatedarktowerrelay-electron rebuild` (tar is build-time only, never runtime).
#  - tmp: `tmp@0.0.33` is pulled by external-editor (interactive CLI prompts); the
#    fix ships only in 0.2.6+. Forcing 0.2.7 clears 2 alerts.
overrides:
  tar: ^7.5.19
  tmp: ^0.2.7

# electron-forge's @electron/rebuild depends on a git-hosted @electron/node-gyp
# fork; pnpm 11 blocks git-hosted subdeps by default. Allow them so the electron
# app (apps/relay-electron) toolchain installs.
blockExoticSubdeps: false

# Native/build deps explicitly allowed to run install scripts (pnpm 11 blocks
# them by default). esbuild bundles the core ESM output; the BLE/serial/usb
# natives power apps/relay-{cli,electron}; fs-xattr/macos-alias are electron-forge
# macOS packaging helpers; unrs-resolver is the eslint import resolver's native
# binding. Audit with `pnpm approve-builds`.
allowBuilds:
  esbuild: true
  electron: true
  '@stoprocent/noble': true
  '@stoprocent/bleno': true
  '@stoprocent/bluetooth-hci-socket': true
  '@serialport/bindings-cpp': true
  usb: true
  fs-xattr: true
  macos-alias: true
  unrs-resolver: true
