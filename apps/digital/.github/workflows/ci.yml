name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout UTDD
        uses: actions/checkout@v4
        with:
          path: UltimateDarkTowerDigital

      # UTDD links the libraries via file:../ — check them out as siblings and build
      # their dist/ so the file: links resolve. (Pin to tags once the libs publish the
      # versions UTDD targets; see docs/prd/prd-00-scaffolding.md Open Questions.)
      - name: Checkout UltimateDarkTower
        uses: actions/checkout@v4
        with:
          repository: ChessMess/UltimateDarkTower
          path: UltimateDarkTower
      - name: Checkout UltimateDarkTowerDisplay
        uses: actions/checkout@v4
        with:
          repository: ChessMess/UltimateDarkTowerDisplay
          path: UltimateDarkTowerDisplay
      - name: Checkout UltimateDarkTowerBoard
        uses: actions/checkout@v4
        with:
          repository: ChessMess/UltimateDarkTowerBoard
          path: UltimateDarkTowerBoard

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build linked libraries
        run: |
          for lib in UltimateDarkTower UltimateDarkTowerDisplay UltimateDarkTowerBoard; do
            (cd "$lib" && npm ci && npm run build)
          done

      - name: Install UTDD
        working-directory: UltimateDarkTowerDigital
        run: npm install

      - name: Run CI (lint, typecheck, test, build)
        working-directory: UltimateDarkTowerDigital
        run: npm run ci
