name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: UltimateDarkTowerDigital
      - uses: actions/checkout@v4
        with:
          repository: ChessMess/UltimateDarkTower
          path: UltimateDarkTower
      - uses: actions/checkout@v4
        with:
          repository: ChessMess/UltimateDarkTowerDisplay
          path: UltimateDarkTowerDisplay
      - uses: actions/checkout@v4
        with:
          repository: ChessMess/UltimateDarkTowerBoard
          path: UltimateDarkTowerBoard
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build linked libraries
        run: |
          for lib in UltimateDarkTower UltimateDarkTowerDisplay UltimateDarkTowerBoard; do
            (cd "$lib" && npm ci && npm run build)
          done
      - name: Build UTDD
        working-directory: UltimateDarkTowerDigital
        env:
          GITHUB_PAGES: 'true'
        run: |
          npm install
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: UltimateDarkTowerDigital/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
