<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DarkTowerSync — Remote Player</title>
    <style>
      :root {
        --bg: #1a1a1a;
        --fg: #e8e8e8;
        --accent: #c0392b;
        --accent-dim: #7b241c;
        --card: #2a2a2a;
        --border: #444;
        --success: #27ae60;
        --warning: #f39c12;
        --error: #e74c3c;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: var(--bg);
        color: var(--fg);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem 1rem;
      }

      header {
        text-align: center;
        margin-bottom: 2rem;
      }

      header h1 {
        font-size: 2rem;
        color: var(--accent);
        letter-spacing: 0.05em;
      }

      header p {
        color: #aaa;
        margin-top: 0.4rem;
        font-size: 0.9rem;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 1.5rem;
        width: 100%;
        max-width: 480px;
        margin-bottom: 1.5rem;
      }

      .card h2 {
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #aaa;
        margin-bottom: 1rem;
      }

      .field {
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
        margin-bottom: 1rem;
      }

      label {
        font-size: 0.85rem;
        color: #aaa;
      }

      input[type='text'] {
        background: #111;
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--fg);
        font-size: 0.95rem;
        padding: 0.5rem 0.7rem;
        width: 100%;
      }

      input[type='text']:focus {
        outline: none;
        border-color: var(--accent);
      }

      button {
        background: var(--accent);
        border: none;
        border-radius: 4px;
        color: #fff;
        cursor: pointer;
        font-size: 0.95rem;
        padding: 0.6rem 1.2rem;
        transition: background 0.15s;
        width: 100%;
      }

      button:hover {
        background: #a93226;
      }

      button:disabled {
        background: var(--accent-dim);
        cursor: not-allowed;
        opacity: 0.6;
      }

      #status-bar {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.85rem;
        padding: 0.5rem 0;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--border);
        flex-shrink: 0;
      }

      .dot.connected {
        background: var(--success);
      }

      .dot.error {
        background: var(--error);
      }

      .dot.connecting {
        background: var(--warning);
      }

      #log {
        font-family: 'Menlo', 'Consolas', monospace;
        font-size: 0.75rem;
        color: #aaa;
        height: 140px;
        overflow-y: auto;
        background: #111;
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 0.5rem;
      }

      #log p {
        margin: 0;
        line-height: 1.5;
      }

      footer {
        color: #555;
        font-size: 0.75rem;
        margin-top: auto;
        padding-top: 2rem;
        text-align: center;
      }

      footer a {
        color: #777;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Dark Tower Sync</h1>
      <p>Remote Player Client</p>
    </header>

    <div class="card" id="connection-card">
      <h2>Connect to Host</h2>
      <div class="field">
        <label for="host-url">Host WebSocket URL</label>
        <input
          type="text"
          id="host-url"
          placeholder="ws://192.168.1.x:8765"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
      <div class="field">
        <label for="player-name">Your Name (optional)</label>
        <input type="text" id="player-name" placeholder="Player 2" autocomplete="off" />
      </div>
      <button id="connect-btn">Connect to Host</button>
    </div>

    <div class="card">
      <h2>Status</h2>
      <div id="status-bar">
        <div class="dot" id="relay-dot"></div>
        <span id="relay-status">Not connected to relay</span>
      </div>
      <div id="status-bar" style="margin-top: 0.5rem">
        <div class="dot" id="tower-dot"></div>
        <span id="tower-status">Tower not connected</span>
      </div>
    </div>

    <div class="card">
      <h2>Tower</h2>
      <button id="tower-btn" disabled>Connect to Tower (Bluetooth)</button>
    </div>

    <div class="card">
      <h2>Event Log</h2>
      <div id="log"></div>
    </div>

    <footer>
      <p>
        Powered by
        <a href="https://github.com/chessmess/UltimateDarkTower" target="_blank"
          >UltimateDarkTower</a
        >
        &mdash;
        <a href="https://github.com/ChessMess/DarkTowerSync" target="_blank">DarkTowerSync</a>
      </p>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
