name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Build · Typecheck · Test (Node 22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # The relay BLE natives (@stoprocent/{bleno,noble,bluetooth-hci-socket})
      # build via node-gyp during `pnpm install`; on Linux they need these headers.
      - name: Install BLE build deps
        run: sudo apt-get update && sudo apt-get install -y libbluetooth-dev libudev-dev

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          # pnpm 11.9.0 requires Node >= 22.13 (it loads the node:sqlite
          # built-in); Node 20 crashes at `pnpm install`.
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: Run full CI pipeline (validate:nodes → lint → format:check → build → typecheck → test)
        run: pnpm run ci

  relay-native:
    name: Relay native (${{ matrix.os }} · Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # Node 20 can't run pnpm 11.9.0 (needs >= 22.13); test 22 + 24.
        node: [22, 24]
    steps:
      - uses: actions/checkout@v7

      - name: Install BLE build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libbluetooth-dev libudev-dev

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build the relay libraries + CLI and their workspace deps (core). This
      # exercises the native install path on both OSes; a clean build is the
      # cross-OS smoke test. The relay unit tests (vitest) run in the `checks`
      # job via `pnpm run ci` → `pnpm -r test`.
      # Include core (`ultimatedarktower`) explicitly: the relay packages depend
      # on it, but a `./packages/relay-*...` path-glob filter does not expand the
      # `...` dependency selector to pull core in, so without this core's dist is
      # missing and relay-client fails with "Cannot find module 'ultimatedarktower'".
      # Same reason `ultimatedarktowerdata` is listed explicitly too: since v6,
      # core itself depends on it (board/foe/seed reference data), and the bare
      # `"ultimatedarktower"` filter doesn't pull in core's own workspace deps
      # either — without this, core's typecheck fails with the same
      # "Cannot find module" error, just one level deeper.
      - name: Build relay packages
        run: pnpm --filter "ultimatedarktower" --filter "ultimatedarktowerdata" --filter "./packages/relay-*..." --filter "./apps/relay-cli..." build

      # electron-forge packages the BLE tower emulator. relay-electron requires
      # Node >= 22.12, so only smoke it on the Node 22 leg.
      - name: electron-forge package smoke (relay-electron)
        if: matrix.node == '22'
        run: pnpm --filter ultimatedarktowerrelay-electron exec electron-forge package
