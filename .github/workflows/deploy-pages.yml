name: Deploy Pages

on:
  push:
    branches: [main]
  # Allow a manual pre-cutover run from any branch (near-zero-downtime cutover).
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Pages base path == the repo name. Every demo is served under this prefix.
  BASE_PATH: /UltimateDarkTower

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # pnpm install builds the relay BLE natives via node-gyp on Linux.
      - name: Install BLE build deps
        run: sudo apt-get update && sudo apt-get install -y libbluetooth-dev libudev-dev

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          # pnpm 11.9.0 requires Node >= 22.13 (node:sqlite built-in).
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build the libraries (core, display, board, creator, relay) so the apps'
      # Vite builds resolve each workspace dep against a built dist/. The apps —
      # including the promoted controller and game — are built below with the
      # correct Pages base path.
      - name: Build packages
        run: pnpm --filter "./packages/*" build

      - name: Assemble _site
        run: |
          set -euo pipefail
          B="$BASE_PATH"
          SITE="$PWD/_site"
          rm -rf "$SITE"; mkdir -p "$SITE"

          vbuild() { # <pkg> <subpath> [extra vite args...]
            local pkg="$1" sub="$2"; shift 2
            pnpm --filter "$pkg" exec vite build \
              --base="$B/$sub/" --outDir "$SITE/$sub" --emptyOutDir "$@"
          }

          # Apps (default vite config)
          vbuild "@udtc/creator"               creator
          vbuild "@udtc/player"                player
          vbuild "ultimatedarktowerdigital"    digital
          vbuild "ultimatedarktowerseed"       seed
          vbuild "@dark-tower-sync/client"     sync
          vbuild "ultimatedarktowercontroller" controller
          vbuild "ultimatedarktowergame"       game

          # Library demo sites (dedicated example vite configs)
          vbuild "ultimatedarktowerdisplay" display --config vite.config.example.ts
          vbuild "ultimatedarktowerboard"   board   --config vite.config.example.ts

          # Manual test plans (self-contained HTML, no build step) — served at
          # /manual-testing/ so testers can open them from a stable URL.
          mkdir -p "$SITE/manual-testing"
          cp -r packages/core/manual-testing/.           "$SITE/manual-testing/"

          # Landing page — generated fresh so each component's version + latest
          # commit are current at deploy time. Its imagery lives under /media/
          # (distinct from each app's own /<app>/assets/ emitted by its Vite build).
          node scripts/pages/build-landing.mjs "$SITE/index.html"
          cp docs/pages/styles.css "$SITE/styles.css"
          cp -r docs/pages/media "$SITE/media"
          touch "$SITE/.nojekyll"
          mkdir -p "$SITE/dist/examples/controller"
          cp docs/pages/legacy-controller-redirect.html \
             "$SITE/dist/examples/controller/TowerController.html"

          echo "Assembled site:"; ls -la "$SITE"

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
