name: Release

# Changesets flow: on push to main, open/update a "Version Packages" PR when
# changesets exist; when that PR merges (versions bumped, changesets consumed),
# publish the changed libraries to npm with provenance.
#
# REQUIRES npm Trusted Publishing (OIDC) to be configured on npmjs.com for each
# published package, pointing at this repo + this workflow. Until then, the
# publish step is a no-op safety failure (no npm auth) — nothing is published.
on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # create the version PR and git tags
  pull-requests: write # open/update the "Version Packages" PR
  id-token: write # npm provenance / OIDC Trusted Publishing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install BLE build deps
        run: sudo apt-get update && sudo apt-get install -y libbluetooth-dev libudev-dev

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          # pnpm 11.9.0 requires Node >= 22.13 (node:sqlite built-in).
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          publish: pnpm changeset:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Token auth for npm. NPM_TOKEN tells changesets/action to use the
          # token (not OIDC); NODE_AUTH_TOKEN is what setup-node's .npmrc uses
          # for the actual `npm info`/`npm publish` auth. Token-authenticated
          # reads work on any npm version, avoiding the OIDC+npm11 `npm info`
          # breakage that makes Changesets re-attempt already-published packages.
          # The NPM_TOKEN secret is configured, so publishing uses token auth.
          # (If it were ever removed these go empty → OIDC/no-op path, harmless:
          # nothing publishes.) Provenance still works alongside a token because
          # id-token: write is granted above.
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
          # `changeset:publish` is `pnpm -r build && changeset publish` — the
          # recursive build already builds every workspace package in correct
          # dependency order before `npm publish` runs per package.
          #
          # Until the 2026-07 stack-alignment pass, six packages (core,
          # game-data, relay-{shared,core,client}, display) ALSO carried their
          # own `prepack`/`prepublishOnly` hook that redundantly did `rm -rf
          # dist` + rebuild. Those per-package rebuilds raced — e.g. core's
          # hook (a slow lint+typecheck+test+build) could have core's dist
          # mid-rebuild (or briefly deleted) at the exact moment relay-core's
          # own hook tried to resolve 'ultimatedarktower' from node_modules,
          # and vice versa. That race broke a real release (2026-07-17):
          # relay-core and display failed with a Changesets-masked
          # "ELIFECYCLE undefined" while core/game-data/board published fine.
          #
          # The hooks are gone now (removed, not just disabled — they were
          # pure redundancy given the recursive build above). `ignore-scripts`
          # stays anyway as defense-in-depth: verified against npm's own docs
          # that it only suppresses *automatic* pre/post hooks, so `pnpm -r
          # build`'s explicit invocations above are unaffected either way — if
          # someone adds a prepack hook back to one of these packages without
          # realizing the race risk, this keeps that hook from firing during
          # the one publish path that matters.
          NPM_CONFIG_IGNORE_SCRIPTS: 'true'
