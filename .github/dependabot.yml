# Dependabot configuration.
#
# Scope note: this governs Dependabot *update PRs*, not the Security-tab *alerts*
# list. Alerts are generated from the dependency graph independently — grouping
# here reduces PR churn and keeps deps current (so fewer advisories accumulate),
# but does not change the per-advisory alert count, and `ignore`/directory scope
# does not retroactively close existing alerts.
version: 2
updates:
  # pnpm workspace at the repo root. Dependabot handles pnpm under the `npm`
  # ecosystem (it reads pnpm-lock.yaml + the workspace importers).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      # typescript is held at 5.9.x on purpose — TS 6.0 drops the automatic
      # @types inclusion the packages rely on (see CLAUDE.md).
      #
      # NOTE: an earlier version of this comment also claimed Dependabot "can't
      # resolve the `catalog:` protocol and errors the whole run". That is no
      # longer true — pnpm workspace catalogs went GA in Dependabot in Feb 2025:
      # https://github.blog/changelog/2025-02-04-dependabot-now-supports-pnpm-workspace-catalogs-ga/
      # So the many deps now in the catalog (vite, three, react, ws, ajv, …) do
      # NOT need ignore entries and keep receiving security/version PRs. Only the
      # deliberate version pin below justifies ignoring typescript.
      #
      # Known upstream quirk: Dependabot cannot infer dev-vs-prod for catalogued
      # deps and files them all under `dependency-type: production`, so catalogued
      # devDeps land in the production-dependencies group below.
      # https://github.com/dependabot/dependabot-core/issues/14824
      - dependency-name: "typescript"
      # Only auto-propose patch/minor bumps here. Major dev/prod bumps
      # (eslint 9→10, @types/node 22→26, @dagrejs/dagre 1→3, …) are reviewed and
      # taken manually. Note: this also suppresses auto-PRs for security fixes
      # that are major-only — those still surface as Security-tab alerts to act on.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      # One PR per week for all dev-dependency bumps instead of one-per-package.
      dev-dependencies:
        dependency-type: "development"
      # Group the production-dependency bumps too, so a shared transitive fix
      # (e.g. a single tar/tmp advisory) lands as one PR across the workspace.
      production-dependencies:
        dependency-type: "production"

  # Keep the CI/release GitHub Actions current as well.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
